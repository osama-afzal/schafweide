services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: schafweide_db
    environment:
      POSTGRES_DB: schafweide
      POSTGRES_USER: urwerk
      POSTGRES_PASSWORD: schafweide1467
    ports:
      - "5434:5432"
    volumes:
      - schafweide_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  schafweide_data: